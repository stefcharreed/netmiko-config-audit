[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "config-audit-mcp"
version = "0.1.0"
description = "MCP server exposing netmiko-config-audit drift/promote tools to an LLM."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # Pin below v2: the official SDK's v2 goes stable 2026-07-27 with breaking
    # changes. Stay on the 1.x line until you deliberately migrate.
    "mcp>=1.27,<2",
    # The tool logic imports Project 1. Install it editable alongside this, or
    # add it as a path/VCS dependency once netmiko-config-audit is published.
    "config-audit",
]

[project.scripts]
config-audit-mcp = "config_audit_mcp.server:main"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
