name: tests

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo; drop the token's default write scopes.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10–3.12 on purpose: the sanitizer's wildcard-mask handling depends on
        # a Python 3.12 ipaddress behavior change, so the matrix proves it across
        # versions rather than assuming.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build test stage (runs the real suite inside the image)
        run: docker build --target test -t netmiko-audit:test .
      - name: Build runtime image
        run: docker build -t netmiko-audit .
      - name: Sanity-check the entrypoint
        run: docker run --rm netmiko-audit --help
