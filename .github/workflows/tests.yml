name: tests

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo; drop the token's default write scopes.
permissions:
  contents: read

jobs:
  lint:
    # pyproject.toml carries the ruff config; running it here is what makes that
    # config true. (It sat unenforced for a while and drifted to 27 violations —
    # found 2026-07-07 during a same-bar comparison against paloalto-config-audit.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff
        run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10–3.12 on purpose: the sanitizer's wildcard-mask handling depends on
        # a Python 3.12 ipaddress behavior change, so the matrix proves it across
        # versions rather than assuming.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build test stage (runs the real suite inside the image)
        run: docker build --target test -t netmiko-audit:test .
      - name: Build runtime image
        run: docker build -t netmiko-audit .
      - name: Scan image for fixable HIGH/CRITICAL vulns (Trivy)
        # Actionable-only gate: --ignore-unfixed means it fails ONLY for CVEs that
        # have a fix available (bump the dep or base image), never on the permanently-
        # unfixable base-image CVEs (calibrated 2026-07-02 against the real image:
        # 25 HIGH / 8 CRITICAL total, all unfixable; fixable HIGH/CRITICAL = 0, green).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netmiko-audit
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Sanity-check the entrypoint
        run: docker run --rm netmiko-audit --help
